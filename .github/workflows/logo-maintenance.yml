name: Scheduled Logo Maintenance

on:
  schedule:
    - cron: "0 3 1 * *"
    - cron: "0 3 10 * *"
  workflow_dispatch:
    inputs:
      action:
        description: "Workflow action"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - update-branch
          - merge-branch
      scope:
        description: "Maintenance scope for update-branch"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - monthly-focus
          - full

permissions:
  contents: write

concurrency:
  group: conference-logo-maintenance
  cancel-in-progress: false

env:
  UPDATE_BRANCH: scheduled-logo-maintenance

jobs:
  update-logos:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Resolve maintenance plan
        id: plan
        shell: bash
        run: |
          action="${{ github.event.inputs.action }}"
          scope="${{ github.event.inputs.scope }}"
          day="$(date -u +%d)"

          if [ -z "$action" ] || [ "$action" = "auto" ]; then
            if [ "$day" = "10" ]; then
              action="merge-branch"
            else
              action="update-branch"
            fi
          fi

          if [ -z "$scope" ] || [ "$scope" = "auto" ]; then
            if [ "$(date -u +%m)" = "01" ]; then
              scope="full"
            else
              scope="monthly-focus"
            fi
          fi
          echo "action=$action" >> "$GITHUB_OUTPUT"
          echo "scope=$scope" >> "$GITHUB_OUTPUT"
          echo "Resolved action: $action"
          echo "Resolved scope: $scope"

      - name: Run logo maintenance
        if: steps.plan.outputs.action == 'update-branch'
        shell: bash
        run: |
          if [ "${{ steps.plan.outputs.scope }}" = "full" ]; then
            python scripts/fetch_ccf_logos.py \
              --refresh-existing \
              --ccfddl-cache-dir .cache/ccfddl-yaml \
              --timeout 10 --sleep 0.02 --candidate-limit 8
          else
            python scripts/fetch_ccf_logos.py \
              --only-annual-update \
              --refresh-existing \
              --ccfddl-cache-dir .cache/ccfddl-yaml \
              --timeout 10 --sleep 0.02 --candidate-limit 8
          fi

      - name: Regenerate reports and verify scripts
        if: steps.plan.outputs.action == 'update-branch'
        run: |
          python -m py_compile scripts/fetch_ccf_logos.py scripts/audit_logo_integrity.py scripts/generate_logo_focus_report.py
          python scripts/audit_logo_integrity.py \
            --manifest manifest.json \
            --overrides audit/false_positive_overrides.json \
            --report reports/logo_integrity_check_latest.md
          python scripts/generate_logo_focus_report.py

      - name: Commit updated assets and reports to update branch
        id: commit_update
        if: steps.plan.outputs.action == 'update-branch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$UPDATE_BRANCH"
          git add assets/logos manifest.json update_list.md reports/logo_integrity_check_latest.md reports/logo_update_focus_latest.md
          if git diff --cached --quiet; then
            echo "No logo maintenance changes to commit."
            git push origin --delete "$UPDATE_BRANCH" 2>/dev/null || true
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: scheduled logo maintenance (${{ steps.plan.outputs.scope }})"
          git push --force-with-lease origin "HEAD:$UPDATE_BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Send review email notification
        if: steps.plan.outputs.action == 'update-branch' && steps.commit_update.outputs.changed == 'true'
        env:
          NOTIFY_EMAIL: ${{ vars.NOTIFY_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          MAINTENANCE_SCOPE: ${{ steps.plan.outputs.scope }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BRANCH_URL: https://github.com/${{ github.repository }}/tree/scheduled-logo-maintenance
        run: python scripts/send_update_notification.py

      - name: Merge update branch into main
        if: steps.plan.outputs.action == 'merge-branch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git ls-remote --exit-code --heads origin "$UPDATE_BRANCH"; then
            echo "No $UPDATE_BRANCH branch exists; nothing to merge."
            exit 0
          fi
          git fetch origin "$UPDATE_BRANCH"
          git merge --no-edit --no-ff FETCH_HEAD
          git push origin HEAD:main
          git push origin --delete "$UPDATE_BRANCH"
